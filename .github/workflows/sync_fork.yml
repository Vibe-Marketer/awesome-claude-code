name: Sync Fork

actions:
  - name: Sync Fork
    on:
      schedule:
        - cron: '0 * * * *'
      workflow_dispatch:
    jobs:
      sync:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@v2

          - name: Add upstream remote
            run: git remote add upstream https://github.com/hesreallyhim/awesome-claude-code.git

          - name: Fetch upstream
            run: git fetch upstream

          - name: Merge upstream
            run: git merge upstream/main

          - name: Push changes
            run: git push origin main